name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package installer
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SignPath ile imzalama (SignPath Foundation onayından sonra aktifleştir)
      # - name: Submit for signing
      #   uses: signpath/signpath-github-action@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
      #     project-slug: soresti-launcher
      #     signing-policy-slug: release-signing
      #     input-artifact-path: release/*.exe
      #     output-artifact-path: release/*-signed.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: release/*.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
